<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D模具预览 - 终极稳定版</title>
    <!-- 回退到稳定版本：0.132.2（OrbitControls挂载到THREE全局） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { height: 100vh; display: flex; background: #f5f7fa; color: #333; overflow: hidden; }

        /* 左侧侧边栏（完整保留） */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 8px rgba(0,0,0,0.05);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 10;
        }
        .module-title {
            font-size: 14px;
            font-weight: 600;
            color: #165DFF;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e5e7eb;
        }

        /* 零件列表（完整保留） */
        .part-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .part-item {
            display: grid;
            grid-template-columns: 20px 60px 40px 80px;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .part-item:hover { background: #f5f7fa; }
        .part-item.checked {
            background: #e8f3ff;
            border: 1px solid #165DFF;
        }
        .part-item input { cursor: pointer; }
        .part-all-btn {
            font-size: 11px;
            color: #165DFF;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-top: 5px;
            text-align: left;
        }

        /* 控制面板（完整保留所有按钮） */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-btn {
            padding: 8px 10px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .control-btn:hover {
            background: #e8f3ff;
            border-color: #165DFF;
        }
        .control-btn.active {
            background: #165DFF;
            color: #fff;
            border-color: #165DFF;
        }
        .control-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .mode-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        /* 操作提示（完整保留） */
        .status {
            margin-top: auto;
            padding: 10px 12px;
            background: #e8f3ff;
            border: 1px solid #165DFF;
            border-radius: 4px;
            font-size: 12px;
            color: #165DFF;
        }

        /* 右侧预览区（修复Canvas尺寸） */
        .preview-area {
            flex: 1;
            position: relative;
            height: 100vh;
            margin-left: 280px;
        }
        #canvas { 
            width: 100%; 
            height: 100%; 
            display: block; /* 关键：修复白屏/黑屏 */
        }

        /* 坐标系（修正显示不全+坐标轴方向） */
        .axes-ui {
            position: absolute;
            left: 20px;
            bottom: 20px;
            z-index: 9999;
            transform: scale(2);
            transform-origin: left bottom; /* 修正缩放原点，避免截断 */
            background: rgba(255,255,255,0.8); /* 加背景，避免和场景融合 */
            padding: 15px;
            border-radius: 8px;
        }
        .axis-origin { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 6px; 
            height: 6px; 
            background: #000; 
            border-radius: 50%; 
            z-index: 1; /* 确保原点在最上层 */
        }
        /* X轴：屏幕水平方向（向右） */
        .axis-x { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 60px; 
            height: 3px; 
            background: #ff0000; 
            transform: rotate(0deg); /* 修正为水平向右 */
            transform-origin: left center; 
        }
        .axis-x::after { 
            content: ''; 
            position: absolute; 
            right: 0; 
            top: -4px; 
            width: 12px; 
            height: 12px; 
            background: #ff0000; 
            clip-path: polygon(100% 50%, 0% 0%, 0% 100%); 
        }
        .axis-x-text { 
            position: absolute; 
            right: -10px; 
            top: -5px; 
            color: #ff0000; 
            font-size: 14px; 
            font-weight: bold; 
        }
        /* Y轴：屏幕向上方向（垂直向上） */
        .axis-y { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 3px; 
            height: 60px; 
            background: #00ff00; 
            transform: translateY(-100%); /* 修正为垂直向上 */
            transform-origin: center bottom; 
        }
        .axis-y::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: -4px; 
            width: 12px; 
            height: 12px; 
            background: #00ff00; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
        }
        .axis-y-text { 
            position: absolute; 
            top: -15px; 
            left: -8px; 
            color: #00ff00; 
            font-size: 14px; 
            font-weight: bold; 
        }
        /* Z轴：垂直屏幕指向操作者（斜向） */
        .axis-z { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 60px; 
            height: 3px; 
            background: #0000ff; 
            transform: rotate(-45deg); /* 修正为指向操作者 */
            transform-origin: left center; 
        }
        .axis-z::after { 
            content: ''; 
            position: absolute; 
            right: 0; 
            top: -4px; 
            width: 12px; 
            height: 12px; 
            background: #0000ff; 
            clip-path: polygon(100% 50%, 0% 0%, 0% 100%); 
        }
        .axis-z-text { 
            position: absolute; 
            right: -10px; 
            top: -10px; 
            color: #0000ff; 
            font-size: 14px; 
            font-weight: bold; 
            transform: rotate(-45deg); 
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- 零件列表（完整保留） -->
        <div class="part-module">
            <div class="module-title">零件列表</div>
            <div class="part-list">
                <div class="part-item checked" data-part="core">
                    <input type="checkbox" checked id="core">
                    <label for="core">型芯</label>
                    <span>1件</span>
                    <span>模具钢</span>
                </div>
                <div class="part-item" data-part="cavity">
                    <input type="checkbox" id="cavity">
                    <label for="cavity">型腔</label>
                    <span>1件</span>
                    <span>模具钢</span>
                </div>
                <div class="part-item" data-part="part">
                    <input type="checkbox" id="part">
                    <label for="part">产品</label>
                    <span>1件</span>
                    <span>ABS</span>
                </div>
            </div>
            <button class="part-all-btn" id="selectAll">全选</button>
            <button class="part-all-btn" id="unSelectAll">取消全选</button>
        </div>

        <!-- 控制面板（完整保留所有按钮） -->
        <div class="control-panel">
            <!-- 视图控制（三轴旋转+重置视图） -->
            <div class="control-group">
                <div class="module-title">视图控制</div>
                <div class="control-btn-group">
                    <button class="control-btn" id="rotateX">绕X轴旋转</button>
                    <button class="control-btn" id="rotateY">绕Y轴旋转</button>
                    <button class="control-btn" id="rotateZ">绕Z轴旋转</button>
                </div>
                <button class="control-btn" id="resetView">重置视图</button>
            </div>

            <!-- 操作模式（完整保留） -->
            <div class="control-group">
                <div class="module-title">操作模式</div>
                <div class="mode-btn-group">
                    <button class="control-btn" id="startDrag">开启拖动</button>
                    <button class="control-btn" id="stopAll">关闭拖动/转动</button>
                    <button class="control-btn" id="freeRotate">自由转动</button>
                </div>
            </div>

            <!-- 模型操作（完整保留） -->
            <div class="control-group">
                <div class="module-title">模型操作</div>
                <button class="control-btn" id="expandModels">展开所有模型</button>
                <button class="control-btn" id="resetPos">重置模型位置</button>
            </div>

            <!-- 显示设置（完整保留） -->
            <div class="control-group">
                <div class="module-title">显示设置</div>
                <button class="control-btn" id="toggleAxes">坐标系显/隐</button>
                <button class="control-btn" id="toggleBg">切换背景色</button>
            </div>
        </div>

        <!-- 操作提示（完整保留） -->
        <div class="status" id="status">初始化中...</div>
    </div>

    <div class="preview-area">
        <!-- 坐标系（修正显示+方向） -->
        <div class="axes-ui" id="axes">
            <div class="axis-origin"></div>
            <div class="axis-x"><div class="axis-x-text">X</div></div>
            <div class="axis-y"><div class="axis-y-text">Y</div></div>
            <div class="axis-z"><div class="axis-z-text">Z</div></div>
        </div>
        <div id="canvas"></div>
    </div>

    <script>
        // 核心变量（完整保留所有状态）
        let scene, camera, renderer, controls;
        let allMeshes = []; // 所有可交互的模型网格
        let modelGroups = { // 模型组（控制显隐）
            core: null,
            cavity: null,
            part: null
        };
        let isRotate = { x: false, y: false, z: false }; // 三轴自动旋转
        let isDragMode = false;   // 仅拖动模式
        let isRotateMode = false; // 仅自由转动模式
        let selectedMesh = null;  // 当前选中的模型
        let mouse = new THREE.Vector2();
        let mouseDown = false;
        let raycaster = new THREE.Raycaster();

        // ========== 1. 初始化场景（优先执行，确保渲染） ==========
        function initScene() {
            // 1.1 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f7fa);

            // 1.2 创建相机（确保指向模型中心）
            const previewArea = document.querySelector('.preview-area');
            const width = previewArea.clientWidth;
            const height = previewArea.clientHeight;
            camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
            camera.position.set(0, 5, 8); // 近距离确保模型可见
            camera.lookAt(new THREE.Vector3(0, 0, 0));

            // 1.3 创建渲染器（强制渲染，避免白屏）
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false,
                powerPreference: "high-performance" // 提升性能
            });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.clear(); // 清空缓存
            document.getElementById('canvas').appendChild(renderer.domElement);

            // 1.4 添加灯光（多组灯光确保模型可见）
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // 环境光
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2); // 主方向光
            dirLight1.position.set(5, 10, 7);
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8); // 辅助光
            dirLight2.position.set(-5, -5, 7);
            scene.add(ambientLight, dirLight1, dirLight2);

            // 1.5 添加网格辅助线（验证场景正常）
            const gridHelper = new THREE.GridHelper(20, 20, 0xcccccc, 0xeeeeee);
            scene.add(gridHelper);

            // 1.6 窗口自适应
            window.addEventListener('resize', () => {
                const w = previewArea.clientWidth;
                const h = previewArea.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            console.log("✅ 场景初始化完成，尺寸：", width, "x", height);
        }

        // ========== 2. 创建测试模型（强制显示，确保可见） ==========
        function createTestModels() {
            // 2.1 创建型芯（橙色立方体，默认显示）
            const coreGeometry = new THREE.BoxGeometry(2, 2, 2);
            const coreMaterial = new THREE.MeshLambertMaterial({
                color: 0xff8800,
                transparent: true,
                opacity: 0.9
            });
            const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
            coreMesh.userData = { modelKey: 'core', origin: { pos: [0,0,0], rot: [0,0,0] } };
            const coreGroup = new THREE.Group();
            coreGroup.add(coreMesh);
            coreGroup.visible = true;
            scene.add(coreGroup);
            modelGroups.core = coreGroup;
            allMeshes.push(coreMesh);

            // 2.2 创建型腔（蓝色线框立方体，默认隐藏）
            const cavityGeometry = new THREE.BoxGeometry(2.2, 2.2, 2.2);
            const cavityMaterial = new THREE.MeshLambertMaterial({
                color: 0x0088ff,
                wireframe: true
            });
            const cavityMesh = new THREE.Mesh(cavityGeometry, cavityMaterial);
            cavityMesh.userData = { modelKey: 'cavity', origin: { pos: [0,0,0], rot: [0,0,0] } };
            const cavityGroup = new THREE.Group();
            cavityGroup.add(cavityMesh);
            cavityGroup.visible = false;
            scene.add(cavityGroup);
            modelGroups.cavity = cavityGroup;
            allMeshes.push(cavityMesh);

            // 2.3 创建产品（绿色圆柱体，默认隐藏）
            const partGeometry = new THREE.CylinderGeometry(0.8, 0.8, 2, 32);
            const partMaterial = new THREE.MeshLambertMaterial({
                color: 0x00ff88,
                transparent: true,
                opacity: 0.9
            });
            const partMesh = new THREE.Mesh(partGeometry, partMaterial);
            partMesh.userData = { modelKey: 'part', origin: { pos: [0,0,0], rot: [0,0,0] } };
            const partGroup = new THREE.Group();
            partGroup.add(partMesh);
            partGroup.visible = false;
            scene.add(partGroup);
            modelGroups.part = partGroup;
            allMeshes.push(partMesh);

            // 强制渲染一次，确保模型显示
            renderer.render(scene, camera);
            updateStatus("✅ 测试模型创建完成：型芯（橙色）已显示");
            console.log("✅ 测试模型创建完成，数量：", allMeshes.length);
        }

        // ========== 3. 初始化控制器（0.132.2版本兼容） ==========
        function initControls() {
            // 0.132.2版本的OrbitControls直接挂载到THREE，无构造函数问题
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enabled = false; // 默认禁用
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enablePan = false;
            controls.enableZoom = true; // 滚轮缩放
            controls.enableRotate = true;
            controls.minDistance = 2;
            controls.maxDistance = 30;
            console.log("✅ OrbitControls初始化完成");
        }

        // ========== 4. 绑定所有事件（完整保留功能） ==========
        function bindEvents() {
            // 4.1 零件显隐控制
            document.querySelectorAll('.part-item input').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const key = e.target.id;
                    if (modelGroups[key]) {
                        modelGroups[key].visible = e.target.checked;
                        e.target.closest('.part-item').classList.toggle('checked', e.target.checked);
                        updateStatus(`${key === 'core' ? '型芯' : key === 'cavity' ? '型腔' : '产品'}：${e.target.checked ? '显示' : '隐藏'}`);
                        // 强制渲染
                        renderer.render(scene, camera);
                    }
                });
            });

            // 全选/取消全选
            document.getElementById('selectAll').onclick = () => {
                document.querySelectorAll('.part-item input').forEach(checkbox => {
                    checkbox.checked = true;
                    checkbox.dispatchEvent(new Event('change'));
                });
                updateStatus("✅ 已全选所有零件");
            };
            document.getElementById('unSelectAll').onclick = () => {
                document.querySelectorAll('.part-item input').forEach(checkbox => {
                    checkbox.checked = false;
                    checkbox.dispatchEvent(new Event('change'));
                });
                updateStatus("✅ 已取消全选所有零件");
            };

            // 4.2 三轴自动旋转
            document.getElementById('rotateX').onclick = () => {
                isRotate.x = !isRotate.x;
                if (isRotate.x) resetAllModes();
                updateStatus(isRotate.x ? "🔄 绕X轴自动旋转中" : "⏹️ 绕X轴自动旋转停止");
            };
            document.getElementById('rotateY').onclick = () => {
                isRotate.y = !isRotate.y;
                if (isRotate.y) resetAllModes();
                updateStatus(isRotate.y ? "🔄 绕Y轴自动旋转中" : "⏹️ 绕Y轴自动旋转停止");
            };
            document.getElementById('rotateZ').onclick = () => {
                isRotate.z = !isRotate.z;
                if (isRotate.z) resetAllModes();
                updateStatus(isRotate.z ? "🔄 绕Z轴自动旋转中" : "⏹️ 绕Z轴自动旋转停止");
            };

            // 4.3 重置视图
            document.getElementById('resetView').onclick = () => {
                isRotate = { x: false, y: false, z: false };
                // 重置模型角度
                allMeshes.forEach(mesh => {
                    mesh.rotation.set(...mesh.userData.origin.rot);
                });
                // 重置相机
                camera.position.set(0, 5, 8);
                camera.lookAt(0, 0, 0);
                controls.update();
                renderer.render(scene, camera);
                updateStatus("✅ 模型角度已重置，自动旋转已停止");
            };

            // 4.4 操作模式控制（互斥）
            const dragBtn = document.getElementById('startDrag');
            const stopBtn = document.getElementById('stopAll');
            const rotateBtn = document.getElementById('freeRotate');

            // 开启拖动
            dragBtn.onclick = () => {
                resetAllModes();
                isDragMode = true;
                controls.enabled = false;
                dragBtn.classList.add('active');
                renderer.domElement.style.cursor = "move";
                updateStatus("✋ 操作模式：仅可拖动零件（左键按住拖动）");
            };

            // 关闭所有操作
            stopBtn.onclick = () => {
                resetAllModes();
                renderer.domElement.style.cursor = "default";
                updateStatus("❌ 操作模式：禁用拖动/转动");
            };

            // 自由转动
            rotateBtn.onclick = () => {
                resetAllModes();
                isRotateMode = true;
                controls.enabled = true;
                rotateBtn.classList.add('active');
                renderer.domElement.style.cursor = "grab";
                updateStatus("🔄 操作模式：仅可自由转动（左键/滚轮缩放）");
            };

            // 重置所有模式状态
            function resetAllModes() {
                isDragMode = false;
                isRotateMode = false;
                isRotate = { x: false, y: false, z: false };
                selectedMesh = null;
                mouseDown = false;
                controls.enabled = false;
                dragBtn.classList.remove('active');
                rotateBtn.classList.remove('active');
            }

            // 4.5 模型操作
            // 展开模型
            document.getElementById('expandModels').onclick = () => {
                allMeshes.forEach(mesh => {
                    if (mesh.userData.modelKey === 'core') mesh.position.z = -1;
                    if (mesh.userData.modelKey === 'cavity') mesh.position.z = 1;
                    if (mesh.userData.modelKey === 'part') mesh.position.z = 0;
                });
                renderer.render(scene, camera);
                updateStatus("✅ 模型已沿Z轴展开");
            };

            // 重置模型位置
            document.getElementById('resetPos').onclick = () => {
                allMeshes.forEach(mesh => {
                    mesh.position.set(...mesh.userData.origin.pos);
                    mesh.rotation.set(...mesh.userData.origin.rot);
                });
                // 重置相机
                camera.position.set(0, 5, 8);
                camera.lookAt(0, 0, 0);
                controls.update();
                renderer.render(scene, camera);
                updateStatus(`✅ 成功重置${allMeshes.length}个模型的位置/角度`);
            };

            // 4.6 显示设置
            // 坐标系显/隐
            document.getElementById('toggleAxes').onclick = () => {
                const axes = document.getElementById('axes');
                axes.style.display = axes.style.display === 'none' ? 'block' : 'none';
                updateStatus(`📐 坐标系已${axes.style.display === 'block' ? '显示' : '隐藏'}`);
            };

            // 切换背景色
            document.getElementById('toggleBg').onclick = () => {
                const isLight = scene.background.getHex() === 0xf5f7fa;
                scene.background.set(isLight ? 0x222831 : 0xf5f7fa);
                renderer.render(scene, camera);
                updateStatus(`🎨 背景色已切换为${isLight ? '深色' : '浅色'}`);
            };

            // 4.7 拖动功能
            const canvas = renderer.domElement;
            // 鼠标按下选中模型
            canvas.addEventListener('mousedown', (e) => {
                if (!isDragMode) return;
                mouseDown = true;
                const rect = canvas.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                // 射线检测选中Mesh
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(allMeshes.filter(m => m.visible));
                
                if (intersects.length > 0) {
                    selectedMesh = intersects[0].object;
                    updateStatus(`✅ 已选中：${selectedMesh.userData.modelKey}（按住左键拖动）`);
                }
            });

            // 鼠标移动拖动模型
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragMode || !mouseDown || !selectedMesh) return;
                const rect = canvas.getBoundingClientRect();
                const dx = (e.movementX / rect.width) * 5;
                const dz = (e.movementY / rect.height) * 5;
                selectedMesh.position.x += dx;
                selectedMesh.position.z += dz;
            });

            // 鼠标松开
            canvas.addEventListener('mouseup', () => {
                mouseDown = false;
                selectedMesh = null;
                if (isDragMode) updateStatus("✋ 操作模式：仅可拖动零件（左键按住拖动）");
            });
            canvas.addEventListener('mouseleave', () => {
                mouseDown = false;
                selectedMesh = null;
            });
        }

        // ========== 5. 动画循环（确保模型渲染） ==========
        function animate() {
            requestAnimationFrame(animate);

            // 三轴自动旋转
            if (isRotate.x || isRotate.y || isRotate.z) {
                allMeshes.forEach(mesh => {
                    if (mesh.visible) {
                        if (isRotate.x) mesh.rotation.x += 0.005;
                        if (isRotate.y) mesh.rotation.y += 0.005;
                        if (isRotate.z) mesh.rotation.z += 0.005;
                    }
                });
            }

            // 自由转动控制器更新
            if (isRotateMode) controls.update();

            // 强制渲染场景
            renderer.render(scene, camera);
        }

        // ========== 辅助函数：更新状态提示 ==========
        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }

        // ========== 入口函数：容错执行 ==========
        window.onload = () => {
            try {
                initScene();       // 1. 初始化场景（优先）
                createTestModels(); // 2. 创建测试模型（强制显示）
                initControls();     // 3. 初始化控制器（0.132.2兼容）
                bindEvents();       // 4. 绑定所有事件
                animate();          // 5. 启动动画循环
                updateStatus("✅ 初始化完成 | 型芯（橙色）已显示 | 所有功能可用");
            } catch (e) {
                updateStatus(`❌ 初始化异常：${e.message}`);
                console.error("初始化报错详情：", e);
                // 即使报错，也强制创建模型并渲染
                if (!scene) initScene();
                if (allMeshes.length === 0) createTestModels();
                renderer.render(scene, camera);
            }
        };

        // 额外容错：页面加载完成后再强制渲染一次
        window.addEventListener('load', () => {
            setTimeout(() => {
                renderer.render(scene, camera);
                console.log("✅ 页面加载完成，强制渲染一次");
            }, 500);
        });
    </script>
</body>
</html>
